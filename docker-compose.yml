version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: car-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cars

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cars"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: