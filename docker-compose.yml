services:
  postgres:
    image: postgres:17-alpine
    container_name: car-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cars

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cars"]
      interval: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./database/migrations:/migrations

    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:postgres@postgres:5432/cars?sslmode=disable",
        "up"
      ]

    restart: "no"


  car_service:
    build: .
    container_name: car-service

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: cars
      POSTGRES_SSLMODE: disable

    ports:
      - "8080:8080"

volumes:
  postgres_data: