version: "2"

sql:
  - engine: "postgresql"
    schema: "./database/migrations"
    queries: "./database/queries"

    gen:
      go:
        package: "db"
        out: "./internal/db"

        sql_package: "pgx/v5"

        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: false
        emit_exact_table_names: false

        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"